<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
        <!-- Leaflet CSS and JavaScript -->
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
        <!-- Leaflet CSS and JavaScript -->
    
    
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <div class="row">
            <section class="main__tagging tagging col-4">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post">

                <!-- ... your code here ... -->
                <fieldset>
                <legend>Add a new GeoTag</legend>

                    <!--... latitude input ...-->
                    <label for="latitude-Tagging">Latitude:</label>
                    <input type="number" name="latitude" id="latitude-Tagging" value="45.34" min="-90" max="90" readonly>

                    <!--... longitude input...-->
                    <label for="longitude-Tagging">Longitude</label>
                    <input type="number" name="longitude"  id="longitude-Tagging" value="45" min="-180" max="180" readonly>

                    <!--... location name input-->

                    <label for="name">Location Name:</label>
                    <input type="text" name="name" id="name" placeholder="e.g. Germersheimer Düne" maxlength="10" required>

                    <!--... hashtag input... -->
                    <label for="hashtag">Hashtag:</label>
                    <input type="text" name="hashtag" id="hashtag" placeholder="e.g. #edu" pattern="^#[A-Za-z]{1,9}$" maxlength="10">

                    <!--... Submit Tagging Form... -->
                    <button type="submit">Add Tag</button>

                </fieldset>       

            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

            </section>

            <section class="main__discovery discovery col-8">
            <h2 class="discovery__title">Discovery</h2>


            <div class="row">
                <div class="col-12">
                    <!-- ############### VS1Lab 1a Form 2 Start -->
                    <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">

                        <!-- ... your code here ... -->

                        <fieldset>
                        <legend>Search</legend>

                            <!--... search input... -->
                            <label for="searchterm">Search term or keywords: </label>
                            <input type="text" name="searchterm" id="searchterm" placeholder="e.g. Germersheim" required>

                            <!-- ... Hidden latitude... -->
                            <input type="hidden" name="latitude" id="latitude-Discovery">
                            <!--... Hidden Longitude...-->
                            <input type="hidden" name="longitude" id="longitude-Discovery">

                            <!--... Submit Discovery Search Form ... -->
                            <button type="submit">Search</button>
                            
                            

                            
                        </fieldset>   

                    </form>
                </div>
            </div>

            
            <!-- ############### VS1Lab 1a Form 2 End -->
            
            <div class="discovery__wrapper row">
                <div class="discovery__taglist col-6">
                        <ul class="discovery__results" id="discoveryResults">
                            <li>Castle (49.01379, 8.404435) #sight</li>
                            <li>IWI (49.01379, 8.390071) #edu</li>
                        </ul>
                </div>

                <div id="map" class="discovery__map col-6">
                        <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                        <span>Result map</span>
                </div>
            </div>
            



            </section>




        </div>
        

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
